name: packaging

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  import-linter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: Checkout
        with:
          lfs: true
      - uses: ./.github/actions/install-all
        with:
          python-version: "3.13"
      - name: Check DDD layering contracts
        run: poetry run lint-imports

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: Checkout
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install poetry
        run: python -m pip install poetry
      - name: Build sdist + wheel
        run: poetry build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  lite-smoke:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: Checkout
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Install bare hyperion-sdk (no extras) in a clean venv
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install dist/*.whl
      - name: Lite imports succeed and heavy deps are absent
        run: .venv/bin/python .github/scripts/smoke.py lite

  extra-smoke:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extra: [aws, data, catalog, geo, snappy]
    steps:
      - uses: actions/checkout@v4
        name: Checkout
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Install hyperion-sdk[${{ matrix.extra }}] in a clean venv
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          WHEEL=$(ls dist/*.whl)
          .venv/bin/pip install "${WHEEL}[${{ matrix.extra }}]"
      - name: Smoke the ${{ matrix.extra }} extra
        run: .venv/bin/python .github/scripts/smoke.py ${{ matrix.extra }}
